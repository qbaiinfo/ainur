<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мазмұн студиясы</title><meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#1B2B27;--evergreen:#2C5F55;--paper:#FAF8F3;--line:#DCE4DD;}
*{box-sizing:border-box;}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Manrope",sans-serif;}
h1{font-family:"Spectral",serif;margin:0;}.wrap{max-width:1060px;margin:0 auto;padding:0 22px;}
.top{background:rgba(250,248,243,.9);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;height:66px;padding:0 22px;}
.back{font-size:.9rem;text-decoration:none;color:var(--evergreen);}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;margin:24px 0;}
label{display:block;font-size:.82rem;font-weight:600;color:#20463F;margin:12px 0 6px;}
textarea,input,select{width:100%;padding:.75em .9em;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;margin:8px 0;}
textarea{min-height:90px;}.row{display:grid;grid-template-columns:1fr 200px;gap:14px;align-items:end;}
.btn{background:var(--evergreen);color:#fff;padding:.8em 1.4em;border-radius:100px;border:0;cursor:pointer;font-weight:600;font-family:inherit;}
.btn:hover{transform:translateY(-2px);}
.btn:disabled{opacity:.6;cursor:wait;}
.err{color:#8a2b2b;background:#fdecec;border:1px solid #f3b6b6;padding:.8em;border-radius:10px;margin:12px 0;display:none;}
.err.show{display:block;}.out{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;margin:24px 0;}
.body{white-space:pre-wrap;color:#33433e;font-size:.98rem;}#results{display:none;}
</style>
</head>
<body>

<div class="top">
  <span style="font-weight:600">📝 Мазмұн студиясы</span>
  <a class="back" href="index.html">← Сайтқа оралу</a>
</div>

<div class="wrap">
<div style="padding:40px 0"><h1>Бір тақырыптан — толық мазмұн</h1><p>Taqyrыp жаз, AI блог + Instagram + TikTok + Facebook мәтіндерін жасап береді.</p></div>

<div class="panel">
<div class="row">
<div><label>Тақырып</label><textarea id="topic" placeholder="Мысалы: EMDR терапиясы дегеніміз не?"></textarea></div>
<div><label>Стиль</label><select id="tone"><option>Жылы әрі қолдаушы</option><option>Ақпараттық</option><option>Шабыттандырушы</option></select><div style="height:12px"></div>
<button class="btn" id="genBtn" onclick="generate()" style="width:100%;">✨ Жасау</button></div>
</div>
<div class="err" id="err"></div>
</div>

<div id="results">
<div class="out"><h3 id="blogTitle"></h3><div class="body" id="blogBody"></div></div>
<h2 style="margin-top:40px">Әлеуметтік желілер</h2>
<div class="out"><b>📷 Instagram</b><div class="body" id="igBody"></div></div>
<div class="out"><b>♪ TikTok</b><div class="body" id="ttBody"></div></div>
<div class="out"><b>f Facebook</b><div class="body" id="fbBody"></div></div>
</div>
</div>

<script>
const $ = id => document.getElementById(id);
async function generate(){
  const topic = $('topic').value.trim();
  const tone = $('tone').value;
  if(!topic){ alert('Тақырып жазыңыз'); return; }
  const btn = $('genBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Жасалуда…';
  $('err').classList.remove('show');
  try{
    const sys = `Қазақ тілінде САПАЛЫ мазмұн жаса. ТЕК JSON қайтар (markdown жоқ):
{"blog":{"title":"...","body":"..."},"instagram":"...","tiktok":"...","facebook":"...","hashtags":["#tag"]}`;
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=AQ.Ab8RN6KHqQj2cQ9fmMnXK_EwIFGmxHkH17Wh36NSuICIN-tJ4Q", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: sys }] },
        contents: [{ role: "user", parts: [{ text: topic + ". Стиль: " + tone }] }],
        generationConfig: { maxOutputTokens: 1500 }
      })
    });
    if(!res.ok) throw new Error(`API ${res.status}`);
    const data = await res.json();
    let text = (data.candidates?.[0]?.content?.parts?.[0]?.text || "").trim();
    text = text.replace(/```json/gi,'').replace(/```/gi,'').trim();
    const match = text.match(/\{[\s\S]*\}/);
    if(!match) throw new Error('JSON yok');
    const j = JSON.parse(match[0]);
    $('blogTitle').textContent = j.blog?.title || '';
    $('blogBody').textContent = j.blog?.body || '';
    $('igBody').textContent = j.instagram || '';
    $('ttBody').textContent = j.tiktok || '';
    $('fbBody').textContent = j.facebook || '';
    $('results').style.display = 'block';
  }catch(e){
    $('err').textContent = `Қате: ${e.message}`;
    $('err').classList.add('show');
  }finally{
    btn.disabled = false;
    btn.innerHTML = '✨ Жасау';
  }
}
</script>
</body>
</html>
