<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мазмұн студиясы</title><meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--ink:#1B2B27;--evergreen:#2C5F55;--honey:#CE9A3B;--line:#DCE4DD;--paper:#FAF8F3;--mist:#E7EFE9;}
*{box-sizing:border-box;}body{margin:0;background:var(--paper);color:var(--ink);font-family:"Manrope",system-ui,sans-serif;font-size:16px;}
h1,h2,h3{font-family:"Spectral",serif;margin:0;}
.wrap{max-width:1060px;margin:0 auto;padding:0 22px;}
.top{background:rgba(250,248,243,.9);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:10;}
.top-in{display:flex;align-items:center;justify-content:space-between;height:66px;}
.brand{display:flex;align-items:center;gap:.55em;font-family:"Spectral";font-weight:600;}
.back{font-size:.9rem;text-decoration:none;display:inline-flex;align-items:center;gap:.4em;}
.hero{padding:40px 0;}h1{font-size:2rem;margin:.2em 0;}
.panel{background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:24px;}
label{display:block;font-size:.82rem;font-weight:600;color:#20463F;margin-bottom:6px;}
textarea,input,select{width:100%;padding:.75em .9em;border:1.5px solid var(--line);border-radius:12px;font-family:inherit;font-size:.98rem;color:var(--ink);background:var(--paper);}
textarea:focus,input:focus,select:focus{outline:none;border-color:var(--evergreen);}
textarea{resize:vertical;min-height:90px;}
.row{display:grid;grid-template-columns:1fr 200px;gap:14px;align-items:end;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-weight:600;padding:.8em 1.4em;border-radius:100px;border:0;cursor:pointer;font-family:inherit;}
.btn-primary{background:var(--evergreen);color:#fff;width:100%;}
.btn-primary:hover{transform:translateY(-2px);}
.btn-primary:disabled{opacity:.6;cursor:wait;}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
.chip{background:var(--mist);border:1px solid var(--line);border-radius:100px;padding:.4em .9em;font-size:.85rem;font-weight:600;color:#20463F;cursor:pointer;}
.chip:hover{background:var(--evergreen);color:#fff;}
.err{display:none;color:#8a2b2b;background:#fdecec;border:1px solid #f3b6b6;padding:.8em;border-radius:10px;margin-top:14px;font-size:.9rem;}
.err.show{display:block;}
.out{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;margin-top:24px;position:relative;}
.out h3{font-size:1.2rem;margin-bottom:.5em;}
.body{white-space:pre-wrap;color:#33433e;font-size:.98rem;}
.copy{position:absolute;top:14px;right:14px;}
.platforms{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:24px;}
.pcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:18px;}
.tag{background:var(--mist);border:1px solid var(--line);border-radius:8px;padding:.3em .7em;font-size:.82rem;color:#20463F;margin-right:6px;margin-top:6px;}
#results{display:none;}
@media(max-width:820px){.row{grid-template-columns:1fr;}.platforms{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="top"><div class="wrap top-in"><span class="brand">📝 Мазмұн студиясы</span><a class="back" href="index.html">← Сайтқа оралу</a></div></div>
<div class="wrap">
<div class="hero"><h1>Бір тақырыптан — толық мазмұн</h1><p>Taqyrыp жаз, AI блог + Instagram + TikTok + Facebook мәтіндерін жасап береді.</p></div>
<div class="panel">
<div class="row">
<div><label for="topic">Тақырып</label><textarea id="topic" placeholder="Мысалы: EMDR терапиясы дегеніміз не?"></textarea></div>
<div><label for="tone">Стиль</label><select id="tone"><option value="жылы әрі қолдаушы">Жылы әрі қолдаушы</option><option value="ақпараттық">Ақпараттық</option><option value="шабыттандырушы">Шабыттандырушы</option></select><div style="height:12px"></div>
<button class="btn btn-primary" id="genBtn" onclick="generate()">✨ AI-мен жасау</button></div>
</div>
<div class="chips"><span class="chip" onclick="setTopic(this)">Мазасыздықпен күресудің 5 әдісі</span><span class="chip" onclick="setTopic(this)">EMDR терапиясы дегеніміз не?</span></div>
<div class="err" id="err"></div>
</div>
<div id="results">
<div class="out"><button class="btn copy" style="padding:.5em 1em;font-size:.85rem" onclick="copyText('blogBody',this)">Көшіру</button><h3 id="blogTitle"></h3><div class="body" id="blogBody"></div></div>
<h2 style="margin-top:40px">Әлеуметтік желілер</h2>
<div class="platforms">
<div class="pcard"><b>📷 Instagram</b><div class="body" id="igBody"></div><button class="btn" style="margin-top:12px;padding:.5em 1em;font-size:.85rem;background:var(--honey);color:#2B2410" onclick="copyText('igBody',this)">Көшіру</button></div>
<div class="pcard"><b>♪ TikTok</b><div class="body" id="ttBody"></div><button class="btn" style="margin-top:12px;padding:.5em 1em;font-size:.85rem;background:var(--honey);color:#2B2410" onclick="copyText('ttBody',this)">Көшіру</button></div>
<div class="pcard"><b>f Facebook</b><div class="body" id="fbBody"></div><button class="btn" style="margin-top:12px;padding:.5em 1em;font-size:.85rem;background:var(--honey);color:#2B2410" onclick="copyText('fbBody',this)">Көшіру</button></div>
</div>
<div id="tags" style="margin-top:14px"></div>
</div>
</div>
<script>
const CONFIG = { aiEndpoint: "/api/studio" };
const $ = id => document.getElementById(id);
function setTopic(el){ $('topic').value = el.textContent; }
function copyText(id, btn){
  const txt = $(id).textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const o = btn.textContent;
    btn.textContent = '✓ Көшірілді';
    setTimeout(() => btn.textContent = o, 1400);
  });
}
async function generate(){
  const topic = $('topic').value.trim();
  const tone = $('tone').value;
  if(!topic){ alert('Тақырып жазыңыз'); return; }
  const btn = $('genBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ Жасалуда…';
  $('err').classList.remove('show');
  try{
    const res = await fetch(CONFIG.aiEndpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, tone, system: 'JSON қайтар' })
    });
    if(!res.ok) throw new Error(`API ${res.status}`);
    const j = await res.json();
    $('blogTitle').textContent = j.blog?.title || '';
    $('blogBody').textContent = j.blog?.body || '';
    $('igBody').textContent = j.instagram || '';
    $('ttBody').textContent = j.tiktok || '';
    $('fbBody').textContent = j.facebook || '';
    const tags = $('tags');
    tags.innerHTML = '';
    (j.hashtags || []).forEach(h => tags.innerHTML += `<span class="tag">${h}</span>`);
    $('results').style.display = 'block';
  }catch(e){
    $('err').textContent = `Қате: ${e.message}`;
    $('err').classList.add('show');
  }finally{
    btn.disabled = false;
    btn.innerHTML = '✨ AI-мен жасау';
  }
}
</script>
</body>
</html>
